<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasMasjid Ar-Ridho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import React, { useState, useEffect, useMemo } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import * as LucideIcons from "https://esm.sh/lucide-react@0.263.1";

        // Pastikan variabel ini terdefinisi di lingkungan hosting Anda
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kas-masjid-app';
        const ADMIN_PASSWORD = "999";

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('public'); 
            const [inputPass, setInputPass] = useState('');
            const [authError, setAuthError] = useState(false);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [logoClicks, setLogoClicks] = useState(0);
            const [editingId, setEditingId] = useState(null);
            const [showPhotoModal, setShowPhotoModal] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [formData, setFormData] = useState({
                title: '', amount: '', type: 'income', method: 'tunai',
                date: new Date().toISOString().split('T')[0], photo: null
            });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { 
                        console.error("Auth Error:", err);
                        // Jika gagal auth, tetap matikan loading agar UI muncul
                        setLoading(false); 
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = [...data].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setTransactions(sorted);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                
                const tunaiIn = transactions.filter(t => t.type === 'income' && t.method === 'tunai').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const tunaiOut = transactions.filter(t => t.type === 'expense' && t.method === 'tunai').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const rekIn = transactions.filter(t => t.type === 'income' && t.method === 'rekening').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const rekOut = transactions.filter(t => t.type === 'expense' && t.method === 'rekening').reduce((acc, curr) => acc + Number(curr.amount), 0);

                return { 
                    income, expense, balance: income - expense,
                    tunai: tunaiIn - tunaiOut,
                    rekening: rekIn - rekOut
                };
            }, [transactions]);

            const handleLogoClick = () => {
                setLogoClicks(prev => {
                    if (prev + 1 >= 5) {
                        setView('auth');
                        return 0;
                    }
                    return prev + 1;
                });
                setTimeout(() => setLogoClicks(0), 3000);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData(prev => ({ ...prev, photo: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            const handleDelete = async (id) => {
                if (!window.confirm("Hapus data ini secara permanen?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', id));
                } catch (err) { console.error("Gagal hapus:", err); }
            };

            const handleEditClick = (t) => {
                setEditingId(t.id);
                setFormData({
                    title: t.title, amount: t.amount, type: t.type, method: t.method || 'tunai',
                    date: t.date, photo: t.photo || null
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    const now = new Date();
                    const payload = {
                        ...formData,
                        amount: Number(formData.amount),
                        time: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                        timestamp: now.getTime(),
                        updatedAt: now.toISOString()
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', editingId), payload);
                        setEditingId(null);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                            ...payload, createdAt: now.toISOString(), uid: user.uid
                        });
                    }
                    setFormData({ title: '', amount: '', type: 'income', method: 'tunai', date: new Date().toISOString().split('T')[0], photo: null });
                } catch (err) { console.error("Gagal simpan:", err); }
            };

            const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);
            const Icon = ({ name, ...props }) => React.createElement(LucideIcons[name] || LucideIcons.HelpCircle, props);

            if (loading) return (
                React.createElement('div', { className: "flex flex-col items-center justify-center min-h-screen bg-emerald-50" },
                    React.createElement('div', { className: "w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mb-4" }),
                    React.createElement('p', { className: "text-[10px] font-extrabold uppercase tracking-widest text-emerald-800" }, "Sinkronisasi...")
                )
            );

            return React.createElement('div', { className: "pb-20" },
                showPhotoModal && React.createElement('div', { 
                    className: "fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4",
                    onClick: () => setShowPhotoModal(null)
                },
                    React.createElement('img', { src: showPhotoModal, className: "max-w-full max-h-full rounded-lg shadow-2xl" })
                ),

                React.createElement('nav', { className: "bg-emerald-800 text-white p-5 sticky top-0 z-50 shadow-md" },
                    React.createElement('div', { className: "max-w-md mx-auto flex justify-between items-center" },
                        React.createElement('div', { onClick: handleLogoClick, className: "cursor-pointer" },
                            React.createElement('h1', { className: "font-extrabold text-xl tracking-tighter flex items-center gap-2" }, 
                                React.createElement(Icon, { name: 'Wallet', size: 20, className: "text-emerald-300" }), "KasMasjid"
                            ),
                            React.createElement('p', { className: "text-[9px] font-bold opacity-70 uppercase" }, "Ar-Ridho Kejati Lampung")
                        ),
                        view === 'admin' && React.createElement('button', { 
                            onClick: () => { setView('public'); setEditingId(null); },
                            className: "bg-rose-500 px-4 py-2 rounded-full text-[9px] font-extrabold uppercase"
                        }, "Selesai")
                    )
                ),

                React.createElement('main', { className: "max-w-md mx-auto p-5 space-y-6" },
                    // Widget Jam dan Tanggal (Harus muncul di Publik & Admin)
                    React.createElement('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-sm text-center border border-slate-100" },
                        React.createElement('p', { className: "text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1" }, 
                            currentTime.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
                        ),
                        React.createElement('div', { className: "text-4xl font-extrabold text-emerald-800 tracking-tighter" }, 
                            currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                            React.createElement('span', { className: "text-2xl opacity-40 mx-1" }, ":"),
                            React.createElement('span', { className: "text-2xl opacity-60" }, currentTime.toLocaleTimeString('id-ID', { second: '2-digit' }))
                        )
                    ),

                    React.createElement('div', { className: "bg-emerald-900 rounded-[3rem] p-8 text-white shadow-2xl relative overflow-hidden" },
                        React.createElement('p', { className: "text-[10px] font-extrabold uppercase tracking-[0.3em] text-emerald-300 mb-2 opacity-80" }, "Total Kas Masjid"),
                        React.createElement('h2', { className: "text-4xl font-extrabold mb-8 tracking-tighter" }, formatIDR(stats.balance)),
                        React.createElement('div', { className: "grid grid-cols-2 gap-3" },
                            React.createElement('div', { className: "bg-white/10 p-4 rounded-3xl" },
                                React.createElement('p', { className: "text-[8px] font-bold uppercase opacity-60 mb-1" }, "Masuk"),
                                React.createElement('p', { className: "text-sm font-bold" }, formatIDR(stats.income))
                            ),
                            React.createElement('div', { className: "bg-black/10 p-4 rounded-3xl text-right" },
                                React.createElement('p', { className: "text-[8px] font-bold uppercase opacity-60 mb-1" }, "Keluar"),
                                React.createElement('p', { className: "text-sm font-bold" }, formatIDR(stats.expense))
                            )
                        )
                    ),

                    view === 'admin' ? React.createElement('div', { className: "space-y-8" },
                        // Ringkasan Tunai & Rekening Khusus Admin
                        React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                            React.createElement('div', { className: "bg-white p-5 rounded-[2rem] border border-emerald-100 shadow-sm" },
                                React.createElement('div', { className: "flex items-center gap-2 mb-2" },
                                    React.createElement(Icon, { name: 'Banknote', size: 14, className: "text-emerald-600" }),
                                    React.createElement('span', { className: "text-[9px] font-extrabold text-slate-400 uppercase" }, "Tunai")
                                ),
                                React.createElement('p', { className: "text-sm font-extrabold text-slate-800" }, formatIDR(stats.tunai))
                            ),
                            React.createElement('div', { className: "bg-white p-5 rounded-[2rem] border border-emerald-100 shadow-sm" },
                                React.createElement('div', { className: "flex items-center gap-2 mb-2" },
                                    React.createElement(Icon, { name: 'CreditCard', size: 14, className: "text-emerald-600" }),
                                    React.createElement('span', { className: "text-[9px] font-extrabold text-slate-400 uppercase" }, "Rekening")
                                ),
                                React.createElement('p', { className: "text-sm font-extrabold text-slate-800" }, formatIDR(stats.rekening))
                            )
                        ),

                        React.createElement('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-lg border border-slate-100" },
                            React.createElement('div', { className: "flex justify-between items-center mb-6" },
                                React.createElement('h3', { className: "text-[10px] font-extrabold uppercase flex items-center gap-2" }, 
                                    React.createElement(Icon, { name: editingId ? 'Pencil' : 'PlusCircle', size: 14, className: "text-emerald-600" }), editingId ? "Koreksi Data" : "Input Transaksi"
                                ),
                                editingId && React.createElement('button', { 
                                    onClick: () => { setEditingId(null); setFormData({title: '', amount: '', type: 'income', method: 'tunai', date: new Date().toISOString().split('T')[0], photo: null}); },
                                    className: "text-rose-500 text-[9px] font-bold uppercase"
                                }, "Batal")
                            ),
                            React.createElement('form', { onSubmit: handleSubmit, className: "space-y-4" },
                                React.createElement('div', { className: "flex bg-slate-100 p-1 rounded-2xl" },
                                    React.createElement('button', { type: 'button', onClick: () => setFormData({...formData, type: 'income'}), className: `flex-1 py-3 rounded-xl text-[10px] font-extrabold uppercase ${formData.type === 'income' ? 'bg-white shadow text-emerald-700' : 'text-slate-400'}` }, "Masuk"),
                                    React.createElement('button', { type: 'button', onClick: () => setFormData({...formData, type: 'expense'}), className: `flex-1 py-3 rounded-xl text-[10px] font-extrabold uppercase ${formData.type === 'expense' ? 'bg-white shadow text-rose-700' : 'text-slate-400'}` }, "Keluar")
                                ),
                                React.createElement('input', { required: true, placeholder: "Keterangan", className: "w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border border-slate-100", value: formData.title, onChange: e => setFormData({...formData, title: e.target.value}) }),
                                React.createElement('input', { required: true, type: 'number', placeholder: "Nominal", className: "w-full p-4 bg-slate-50 rounded-2xl text-lg font-extrabold border border-slate-100", value: formData.amount, onChange: e => setFormData({...formData, amount: e.target.value}) }),
                                React.createElement('input', { required: true, type: 'date', className: "w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border border-slate-100", value: formData.date, onChange: e => setFormData({...formData, date: e.target.value}) }),
                                React.createElement('div', { className: "relative group" },
                                    React.createElement('label', { className: "flex flex-col items-center justify-center w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:border-emerald-300 transition-colors bg-slate-50" },
                                        formData.photo ? 
                                            React.createElement('div', { className: "flex items-center gap-3 w-full" },
                                                React.createElement('img', { src: formData.photo, className: "w-10 h-10 object-cover rounded-lg" }),
                                                React.createElement('p', { className: "text-[10px] font-bold text-emerald-600" }, "Foto Bukti Terlampir")
                                            ) :
                                            React.createElement('div', { className: "flex items-center gap-3" },
                                                React.createElement(Icon, { name: 'Camera', size: 18, className: "text-slate-400" }),
                                                React.createElement('p', { className: "text-[10px] font-bold text-slate-400 uppercase" }, "Upload Bukti Foto")
                                            ),
                                        React.createElement('input', { type: 'file', accept: "image/*", className: "hidden", onChange: handleFileChange })
                                    )
                                ),
                                React.createElement('div', { className: "flex gap-3" },
                                    React.createElement('button', { type: 'button', onClick: () => setFormData({...formData, method: 'tunai'}), className: `flex-1 p-4 rounded-2xl border-2 text-[10px] font-extrabold uppercase flex items-center justify-center gap-2 ${formData.method === 'tunai' ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'border-slate-50 text-slate-300'}` }, React.createElement(Icon, { name: 'Banknote', size: 16 }), "Tunai"),
                                    React.createElement('button', { type: 'button', onClick: () => setFormData({...formData, method: 'rekening'}), className: `flex-1 p-4 rounded-2xl border-2 text-[10px] font-extrabold uppercase flex items-center justify-center gap-2 ${formData.method === 'rekening' ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'border-slate-50 text-slate-300'}` }, React.createElement(Icon, { name: 'CreditCard', size: 16 }), "Rekening")
                                ),
                                React.createElement('button', { type: 'submit', className: "w-full py-5 bg-emerald-700 text-white rounded-[2rem] text-[11px] font-extrabold uppercase shadow-xl" }, editingId ? "Update" : "Simpan")
                            )
                        ),
                        React.createElement('div', { className: "space-y-4" },
                            React.createElement('p', { className: "text-[10px] font-extrabold text-slate-400 uppercase tracking-widest px-4" }, "Log Admin"),
                            transactions.map(t => React.createElement('div', { key: t.id, className: "bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center" },
                                React.createElement('div', { className: "min-w-0" },
                                    React.createElement('p', { className: "font-extrabold text-sm truncate" }, t.title),
                                    React.createElement('p', { className: "text-[9px] font-bold text-slate-400" }, `${t.date} • ${t.method}`)
                                ),
                                React.createElement('div', { className: "flex items-center gap-2" },
                                    t.photo && React.createElement('button', { onClick: () => setShowPhotoModal(t.photo), className: "p-2 bg-emerald-50 text-emerald-600 rounded-xl" }, React.createElement(Icon, { name: 'Image', size: 14 })),
                                    React.createElement('button', { onClick: () => handleEditClick(t), className: "p-2 bg-amber-50 text-amber-500 rounded-xl" }, React.createElement(Icon, { name: 'Pencil', size: 14 })),
                                    React.createElement('button', { onClick: () => handleDelete(t.id), className: "p-2 bg-rose-50 text-rose-500 rounded-xl" }, React.createElement(Icon, { name: 'Trash2', size: 14 }))
                                )
                            ))
                        )
                    ) : 
                    React.createElement('div', { className: "space-y-4" },
                        React.createElement('h3', { className: "text-[10px] font-extrabold uppercase tracking-[0.2em] px-4 text-slate-400" }, "Mutasi Terakhir"),
                        transactions.map(t => React.createElement('div', { key: t.id, className: "bg-white p-6 rounded-[2.5rem] border border-slate-100 flex justify-between items-center" },
                            React.createElement('div', { className: "flex items-center gap-4 min-w-0" },
                                React.createElement('div', { className: `p-3 rounded-2xl ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}` }, 
                                    t.method === 'rekening' ? React.createElement(Icon, { name: 'CreditCard', size: 20 }) : React.createElement(Icon, { name: 'Banknote', size: 20 })
                                ),
                                React.createElement('div', { className: "min-w-0" },
                                    React.createElement('p', { className: "font-extrabold text-sm truncate" }, t.title),
                                    React.createElement('p', { className: "text-[9px] font-bold text-slate-400" }, `${new Date(t.date).toLocaleDateString('id-ID', {day:'numeric', month:'short'})} • ${t.time || '--:--'}`)
                                )
                            ),
                            React.createElement('p', { className: `font-extrabold text-sm ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}` }, (t.type === 'income' ? '+' : '-') + formatIDR(t.amount))
                        ))
                    )
                ),

                view === 'auth' && React.createElement('div', { className: "fixed inset-0 z-[100] bg-emerald-950/90 backdrop-blur flex items-center justify-center p-6" },
                    React.createElement('div', { className: "bg-white w-full max-w-xs p-8 rounded-[3rem] text-center" },
                        React.createElement('div', { className: "w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4" }, React.createElement(Icon, { name: 'Lock', className: "text-emerald-600" })),
                        React.createElement('h2', { className: "font-extrabold text-xl mb-6" }, "Akses Pengurus"),
                        React.createElement('form', { onSubmit: (e) => { e.preventDefault(); if(inputPass === ADMIN_PASSWORD){ setView('admin'); setInputPass(''); } else { setAuthError(true); } } },
                            React.createElement('input', { 
                                type: 'password', autoFocus: true, placeholder: "••••", 
                                className: `w-full p-4 bg-slate-50 border-2 rounded-2xl text-center text-3xl font-extrabold tracking-widest outline-none mb-4 ${authError ? 'border-rose-500 animate-shake' : 'border-slate-100'}`,
                                value: inputPass, onChange: (e) => { setInputPass(e.target.value); setAuthError(false); }
                            }),
                            React.createElement('button', { type: 'submit', className: "w-full py-4 bg-emerald-700 text-white rounded-2xl font-extrabold uppercase text-[10px] tracking-widest" }, "Masuk"),
                            React.createElement('button', { type: 'button', onClick: () => setView('public'), className: "mt-4 text-[9px] font-bold text-slate-400 uppercase" }, "Batal")
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
